# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/brand/icon.png"

  android: "launcher_icon"
  min_sdk_android: 21 

  ios: true
  remove_alpha_channel_ios: true

  web:
    generate: true
    image_path: "assets/brand/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#1976D2"

  windows:
    generate: true
    image_path: "assets/brand/icon.png"
    icon_size: 48 

  macos:
    generate: true
    image_path: "assets/brand/icon.png"
